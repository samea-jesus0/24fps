<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stylePerfil.css') }}">
</head>

<body>

    <nav class="nav-bar">
      <p class="perfil-title">PERFIL</p>
      <ul>
        <li onclick="redirecionar_pesquisa()">Pesquisa</li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>

<div class="container mt-5 text-center">

    <div class="profile-card">

        <!-- FOTO -->
        <img id="preview"
             src="{{ url_for('static', filename='uploads/' + user.foto) }}?{{ range(1,1000)|random }}"
             class="profile-img">

        <h3 class="mt-2">{{ user.nome }}</h3>
        <p class="text-secondary">{{ user.email }}</p>

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data">

            <input type="file"
                   name="foto"
                   class="form-control mb-3 custom-file"
                   accept="image/*"
                   onchange="previewImage(event)">

            <button class="btn btn-custom w-100">
                Atualizar Foto
            </button>

        </form>

        <!-- LOGOUT -->
        <a href="{{ url_for('auth.logout') }}"
           class="btn btn-danger mt-3 w-100">
            Sair
        </a>

    </div>

</div>
 <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
